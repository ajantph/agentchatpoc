<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIAW Page</title>
  </head>
  <body>
	<script type='text/javascript'>
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US';
			embeddedservice_bootstrap.init(
				'00DWG000004eJBJ',
				'MIAW_TPH_Website',
				'https://tripointegroup--nintexupgr.sandbox.my.site.com/MIAWTphWebsite',
				{
					scrt2URL: 'https://tripointegroup--nintexupgr.sandbox.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
	  
	const communityCRMId = 'a00WG00000g3e5aYAA';
	const websiteUrl = document.documentURI;
	const referrerUrl = document.referrer;
	const urlParams = new URLSearchParams(window.location.search);
	const utmSource = urlParams.get('utm_source');
	const utmMedium = urlParams.get('utm_medium');
	const utmCampaign = urlParams.get('utm_campaign');
	const esdName = 'MIAW - TPH Website';
		
	window.addEventListener("onEmbeddedMessagingReady", e => {
		console.log("onEmbeddedMessagingReady event triggered");
	
		embeddedservice_bootstrap.prechatAPI.setVisiblePrechatFields({
			"_firstName": {
			  "value": "",
			  "isEditableByEndUser": true
			},
			"_lastName": {
			  "value": "",
			  "isEditableByEndUser": true
			},
			"_Phone": {
			  "value": "",
			  "isEditableByEndUser": true
			},
			"_Email": {
			  "value": "",
			  "isEditableByEndUser": true
			}
		});
	  
		embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
			"CommunityID": communityCRMId,
			"WebsiteURL1": websiteUrl.slice(0, 255),
			"WebsiteURL2": websiteUrl.slice(255, 510),
			"WebsiteURL3": websiteUrl.slice(510),
			"ReferrerURL1": referrerUrl.slice(0, 255),
			"ReferrerURL2": referrerUrl.slice(255, 510),
			"ReferrerURL3": referrerUrl.slice(510),
			"utm_source": decodeURIComponent(utmSource),
			"utm_medium": decodeURIComponent(utmMedium),
			"utm_medium": decodeURIComponent(utmCampaign),
			"esdName": esdName
		});
	});
	</script>
	<script type='text/javascript' src='https://tripointegroup--nintexupgr.sandbox.my.site.com/MIAWTphWebsite/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>
  </body>
</html>
